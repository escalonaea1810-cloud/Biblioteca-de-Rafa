<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Rafa</title>
    <style>
        body { font-family: sans-serif; background-color: #fff; margin: 0; padding: 15px; }
        h1 { text-align: center; font-weight: 300; font-size: 1.5rem; margin-bottom: 30px; }
        
        /* Esta es la rejilla para celulares */
        .biblioteca-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        .portada {
            width: 100%;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: block;
        }
    </style>
</head>
<body>
    <h1>Biblioteca de Rafa</h1>
    <div class="biblioteca-grid">
        <a href="Portada del caballero y su armadura oxidada Robert Fisher.html"><img src="Portada del caballero y su armadura oxidada Robert Fisher.jpg" class="portada"></a>
    </div>
    <div class="biblioteca-grid">
        <a href="La metamorfosis Franz Kafka.html"><img src="Portada La metamorfosis Franz Kafka.jpg" class="portada"></a>
    </div>
</body>
</html>
