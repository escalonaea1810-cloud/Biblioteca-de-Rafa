<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Rafa</title>
    <style>
        body {
            font-family: 'Helvetica', Arial, sans-serif;
            background-color: #ffffff; /* Fondo blanco */
            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            margin-bottom: 50px;
            color: #111;
        }

        /* La rejilla mágica que acomoda todo al lado */
        .biblioteca-grid {
            display: grid;
            /* Esto hace que se pongan al lado y bajen cuando no quepan más */
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; /* Espacio pequeño entre portadas */
            max-width: 1200px;
            margin: 0 auto;
        }

        .libro-link {
            display: block;
            transition: transform 0.2s;
        }

        .libro-link:hover {
            transform: scale(1.03); /* Se agranda un poquito al pasar el mouse */
        }

        .portada {
            width: 100%;
            display: block;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>Biblioteca de Rafa</h1>

    <div class="biblioteca-grid">

        <a href="Portada del caballero y su armadura oxidada Robert Fisher.html" class="libro-link">
            <img src="Portada del caballero y su armadura oxidada Robert Fisher.jpg" class="portada">
        </a>
        </div>

</body>
</html>
